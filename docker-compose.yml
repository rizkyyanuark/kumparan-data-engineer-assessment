x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2-python3.12
  dns:
    - 8.8.8.8
    - 8.8.4.4
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    # ETL settings
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
    SUPABASE_CONN_STRING: ${SUPABASE_CONN_STRING}
    BACKFILL_CHUNK_DAYS: ${BACKFILL_CHUNK_DAYS:-31}
    BACKFILL_BATCH_SIZE: ${BACKFILL_BATCH_SIZE:-5000}
    DELETE_SYNC_BATCH_SIZE: ${DELETE_SYNC_BATCH_SIZE:-10000}
    _PIP_ADDITIONAL_REQUIREMENTS: "google-cloud-bigquery pandas sqlalchemy psycopg2-binary"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./gcp-key.json:/opt/airflow/gcp-key.json:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5435:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8089:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - airflow-net
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    networks:
      - airflow-net
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "0:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./gcp-key.json:/opt/airflow/gcp-key.json:ro
    networks:
      - airflow-net

volumes:
  postgres-db-volume:

networks:
  airflow-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.28.0.0/16"
        - subnet: "fd00:dead:beef::/48"
